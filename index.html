<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#080808">
    <title>Shongs :D</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Start Screen & Intro Sequence -->
    <div id="start-screen">
        <button class="begin-btn" id="begin-btn">Begin Journey</button>
        <div id="intro-line-1" class="intro-line"></div>
        <div id="intro-line-2" class="intro-line"></div>
    </div>

    <!-- Swipe Tutorial Overlay -->
    <div id="tutorial-overlay">
        <div class="tutorial-content">
            <div class="swipe-animation">
                <div class="phone-outline">
                    <div class="swipe-hand"></div>
                </div>
            </div>
            <div class="tutorial-text">Swipe left or right to skip</div>
        </div>
    </div>

    <!-- Progress Tracker -->
    <div class="progress" id="progress"></div>

    <!-- The Slide Deck -->
    <div class="scene" id="scene"></div>

    <!-- Interaction Hint -->
    <div class="hint" id="hint">
        <span>swipe</span>
        <div class="hint-sep"></div>
        <span>← → keys</span>
    </div>

    <!-- Completion Message -->
    <div class="done-msg" id="done-msg">
        <div class="done-circle">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 2 7.5 2c1.74 0 3.41.81 4.5 2.09C13.09 2.81 14.76 2 16.5 2 19.58 2 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                    fill="rgba(255,255,255,0.7)" />
            </svg>
        </div>
        <div class="done-title">YouTube e save kore raikhen :3</div>
        <div class="done-sub">Bhallagse na?</div>

        <div class="action-btns">
            <a href="https://www.youtube.com/playlist?list=PL_63WefIsqNc5-9Qgo6-LKg1ksgCz8Br5" target="_blank"
                class="action-btn">Open Playlist</a>
            <button onclick="Slideshow.downloadAll()" class="action-btn">Download All</button>
        </div>

        <div class="restart-link" onclick="window.location.reload()">Restart Journey</div>
    </div>

    <!-- Hidden Audio Player -->
    <audio id="audio-player"></audio>

    <!-- Modular Scripts -->
    <script src="assets/js/intro.js"></script>
    <script src="assets/js/slideshow.js"></script>
    <script>
        // Entry Point
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
        });
    </script>
</body>

</html>
