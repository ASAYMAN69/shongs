<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#080808">
    <title>Our Journey</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Start Screen & Intro Sequence -->
    <div id="start-screen">
        <button class="begin-btn" id="begin-btn">Begin Journey</button>
        <div id="intro-line-1" class="intro-line"></div>
        <div id="intro-line-2" class="intro-line"></div>
    </div>

    <!-- Progress Tracker -->
    <div class="progress" id="progress"></div>

    <!-- The Slide Deck -->
    <div class="scene" id="scene"></div>

    <!-- Interaction Hint -->
    <div class="hint" id="hint">
        <span>swipe</span>
        <div class="hint-sep"></div>
        <span>← → keys</span>
    </div>

    <!-- Completion Message -->
    <div class="done-msg" id="done-msg">
        <div class="done-circle">
            <svg width="32" height="32" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="14" cy="14" r="13" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                <path d="M8 14l4 4 8-8" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="done-title">The End</div>
        <div class="done-sub">You've heard them all</div>
        
        <div class="action-btns">
            <a href="https://www.youtube.com/playlist?list=PL_63WefIsqNc5-9Qgo6-LKg1ksgCz8Br5" target="_blank" class="action-btn">Open Playlist</a>
            <button onclick="Slideshow.downloadAll()" class="action-btn">Download All</button>
        </div>

        <div class="restart-link" onclick="window.location.reload()">Restart Journey</div>
    </div>

    <!-- Hidden Audio Player -->
    <audio id="audio-player"></audio>

    <!-- Modular Scripts -->
    <script src="assets/js/intro.js"></script>
    <script src="assets/js/slideshow.js"></script>
    <script>
        // Entry Point
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
        });
    </script>
</body>
</html>
